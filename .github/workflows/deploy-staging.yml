name: Deploy to Staging

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/easepaste

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/easepaste

            # Pull latest images
            docker pull ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            docker pull ${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}

            # Update image tags in compose file (or use env vars)
            export IMAGE_TAG=${{ github.sha }}
            export DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}

            # Bring up services with new images
            IMAGE_TAG=${{ github.sha }} docker compose up -d --no-build api worker

            # Run migrations
            docker run --rm \
              -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
              ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }} \
              node -e "require('./dist/migrations/runner').runMigrations('up').then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1) })"

      - name: Health check
        run: |
          echo "Waiting for service to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.STAGING_HOST }}:3000/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 60 seconds"
          exit 1
