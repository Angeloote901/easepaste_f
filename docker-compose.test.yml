version: '3.9'

# Minimal services required for integration tests.
# Usage: docker compose -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: easepaste
      POSTGRES_PASSWORD: easepaste
      POSTGRES_DB: easepaste_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easepaste -d easepaste_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
